server {
    listen 80;
    server_name localhost;

    # 1. เสิร์ฟไฟล์หน้าเว็บ (Frontend)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. ส่งต่อคำสั่ง (Reverse Proxy) ไปหา PocketBase
    location ~ ^/(api|_)/ {
        proxy_pass http://pocketbase:8090; 
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 🔥 3 บรรทัดนี้คือหัวใจสำคัญที่แก้ปัญหา Real-time ผ่าน Cloudflare
        proxy_buffering off;              # ปิดการกักตุนข้อมูล ให้ส่งผ่านทันที
        proxy_read_timeout 3600s;         # ป้องกัน Nginx ตัดการเชื่อมต่อถ้าระบบเงียบเกิน 1 นาที
        proxy_set_header Connection '';   # บังคับให้เปิด Connection ทิ้งไว้ (Keep-Alive)
    }
}