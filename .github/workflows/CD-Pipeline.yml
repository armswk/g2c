name: CI/CD Pipeline (Build & Deploy Local)

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - '.github/**'           
      - '.gitignore'        
      - 'LICENSE'          
      - '**/*.md'           
      - '.vscode/**'     
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: arc-runner-set
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # 👇 1. เพิ่ม id: vars และเปลี่ยนไปใช้ GITHUB_OUTPUT แทน
      - name: ✂️ Get Short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: 🔑 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 👇 2. เปลี่ยนการอ้างอิงเป็น steps.vars.outputs.SHORT_SHA
      - name: 📦 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/g2c-web:${{ steps.vars.outputs.SHORT_SHA }}
            ghcr.io/${{ github.repository_owner }}/g2c-web:latest

      - name: 🛠️ Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

      # 👇 3. เปลี่ยนการอ้างอิงตรงนี้ด้วยเช่นกัน
      - name: 🚀 Deploy to K3S
        run: |
          kubectl set image deployment/g2c-frontend ghcr.io/${{ github.repository_owner }}/g2c-web:${{ steps.vars.outputs.SHORT_SHA }} -n g2c
          kubectl rollout status deployment/g2c-frontend -n g2c