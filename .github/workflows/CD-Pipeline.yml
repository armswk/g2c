name: CI/CD Pipeline (Build & Deploy via GitOps)

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - '.github/**'
      - '.gitignore'
      - 'LICENSE'
      - '**/*.md'
      - 'GEMINI.md'
      - '.vscode/**'
  workflow_dispatch:

jobs:
  # ─── JOB 1: CONTINUOUS INTEGRATION (BUILD) ───
  build:
    runs-on: arc-runner-set
    permissions:
      contents: read
      packages: write
    # 👇 Map the step output to the job output so the deploy job can read it
    outputs:
      image_sha: ${{ steps.vars.outputs.SHORT_SHA }}
      
    steps:
      - name: 📥 Checkout App Code
        uses: actions/checkout@v4

      - name: ✂️ Get Short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: 🔑 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/g2c-web:${{ steps.vars.outputs.SHORT_SHA }}
            ghcr.io/${{ github.repository_owner }}/g2c-web:latest

  # ─── JOB 2: CONTINUOUS DEPLOYMENT (GITOPS) ───
  update-manifest:
    # 👇 Tells GitHub this job cannot start until 'build' finishes successfully
    needs: build 
    runs-on: arc-runner-set
    
    steps:
      - name: 📂 Checkout Infrastructure Repo
        uses: actions/checkout@v4
        with:
          repository: armswk/homelab-infrastructure
          token: ${{ secrets.INFRA_REPO_PAT }}
          path: infra-repo

      - name: ✍️ Update Image Tag in Manifest
        run: |
          cd infra-repo
          # 👇 Notice we use needs.build.outputs.image_sha to grab the tag from Job 1
          sed -i "s|image: ghcr.io/${{ github.repository_owner }}/g2c-web:.*|image: ghcr.io/${{ github.repository_owner }}/g2c-web:${{ needs.build.outputs.image_sha }}|g" applications/g2c/04-g2c-frontend.yaml
          git diff

      - name: 🚀 Push changes to Infrastructure Repo
        run: |
          cd infra-repo
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          git add applications/g2c/04-g2c-frontend.yaml
          git commit -m "chore(g2c): update frontend image to ${{ needs.build.outputs.image_sha }}"
          git push origin main
