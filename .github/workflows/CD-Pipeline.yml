name: CI/CD Pipeline (Build & Deploy to K3S)
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]  
    paths-ignore:
      - 'README.md'
      - '.github/**'           
      - '.gitignore'        
      - 'LICENSE'          
      - '**/*.md'           
      - '.vscode/**'        
jobs:
  # ==========================================
  # JOB 1: สร้าง Image ด้วย Podman/Buildah
  # ==========================================
  build-and-push:
    runs-on: arc-runner-set # รันบน ARC ของคุณ
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # 1. Login เข้า GHCR
      - name: 🔑 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. Build Image และ Push ไปที่ GHCR
      - name: 📦 Build and push Docker image
        id: build-image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/g2c-web:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/g2c-web:latest

  # ==========================================
  # JOB 2: สั่ง K3S ให้ Deploy (ใช้ ARC ของคุณเอง!)
  # ==========================================
  deploy-to-k3s:
    needs: build-and-push
    runs-on: arc-runner-set
    container:
      image: bitnami/kubectl:latest 
    steps:
      - name: 🚀 Deploy to K3S (Local execution)
        run: |
          # ไม่ต้อง SSH แล้ว! สั่ง kubectl ตรงๆ จากในคลัสเตอร์ได้เลย
          kubectl set image deployment/g2c-frontend g2c-web-container=ghcr.io/armswk/g2c-web:${{ github.sha }} -n g2c
          
          # รอจนกว่า Pod ใหม่จะรันเสร็จ
          kubectl rollout status deployment/g2c-frontend -n g2c